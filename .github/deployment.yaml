apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: REGION-docker.pkg.dev/PROJECT_ID/docker-repo/app:latest
          ports:
            - containerPort: 3000
