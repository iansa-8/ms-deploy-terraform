name: Build and Deploy to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: terraform-k8s-test-493520
  REGION: southamerica-west1
  REPOSITORY: docker-repo
  IMAGE: app
  CLUSTER_NAME: k8s-cluster
  CLUSTER_ZONE: southamerica-west1-b

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Auth con GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 🔧 Setup Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 🧩 FIX IMPORTANTE: plugin GKE auth
      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

      # 🐳 Docker login a Artifact Registry
      - name: Configure Docker
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      # 🏗️ Build imagen
      - name: Build Docker image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} .

      # 📤 Push imagen
      - name: Push Docker image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }}

      # 🔗 Credenciales GKE
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials $CLUSTER_NAME \
            --zone $CLUSTER_ZONE \
            --project $PROJECT_ID
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: True

      # 🚢 Deploy
      - name: Deploy to GKE
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/app app=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }}